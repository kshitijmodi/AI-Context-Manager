name: Deploy to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.GH_HF_AICONTEXTMGR }}
          HF_USERNAME: iamkshitij
          HF_SPACE: AI-Context-Manager
        run: |
          # Ensure we are on the main branch with full history
          git fetch origin main --unshallow || git fetch origin main
          git checkout main

          # Ensure hf remote exists and points to the right Space
          if git remote get-url hf >/dev/null 2>&1; then
            git remote set-url hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE
          else
            git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE
          fi

          # Mirror the main branch to the Space
          git push hf main --force